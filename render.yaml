services:
  - type: web
    name: inbox-pilot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000,https://<your-frontend-domain>.vercel.app
